server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_knowledge_base?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

llm:
  api-key: sk-your-api-key
  api-url: https://api.openai.com/v1
  embedding-model: text-embedding-ada-002
  chat-model: gpt-3.5-turbo
  max-tokens: 2048
  temperature: 0.3

kn:
  chunk:
    max-size: 500
    overlap: 50
  search:
    top-k: 5
    similarity-threshold: 0.5
